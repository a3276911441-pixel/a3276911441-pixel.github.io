<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的照片集</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui; padding: 20px; background: #f5f5f5; }
    h1 { text-align: center; margin-bottom: 30px; color: #333; }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .gallery img:hover { transform: scale(1.03); }
  </style>
</head>
<body>
  <h1>📷 我的照片集</h1>
  <div class="gallery">
    <!-- 👇 把下面换成你的图片名 -->
    <img src="images/IMG20260304142257.jpg" alt="照片1">
    <img src="images/IMG20260304142200.jpg" alt="照片2">
    <img src="images/IMG20260304133457.jpg" alt="照片3">
    <img src="images/IMG20260304124834.jpg" alt="照片4">
    <img src="images/5.jpg" alt="照片5">
    <!-- 继续加更多... -->
  </div>
</body>
</html>
